<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali 2026 🌴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: #ffffff; 
            border-radius: 16px; 
            border: 1px solid #eee; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 12px;
        }

        .day-header { 
            position: sticky; top: 0; z-index: 50; 
            background: rgba(250, 250, 250, 0.9); 
            backdrop-filter: blur(8px); 
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Condensed Category Tags */
        .tag { font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .cat-meals { background: #fee2e2; color: #dc2626; }
        .cat-activity { background: #dcfce7; color: #15803d; }
        .cat-freetime { background: #f3e8ff; color: #7e22ce; }
        .cat-commute { background: #fffbeb; color: #b45309; }
        .cat-default { background: #f4f4f5; color: #52525b; }
    </style>
</head>
<body class="p-5 pb-24">

    <header class="mb-4">
        <h1 class="text-3xl font-800 tracking-tighter">Bali 2026</h1>
        <p class="text-[9px] font-bold text-orange-500 uppercase tracking-[0.2em]">Itinerary</p>
    </header>

    <div class="glass-card bg-black text-white p-4 mb-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="border-r border-white/10 pr-2">
                <p class="text-[8px] opacity-40 font-bold mb-1 uppercase tracking-widest">Depart • CX785</p>
                <div class="flex justify-between items-center text-sm font-bold">
                    <span>HKG → DPS</span>
                    <span class="text-[9px] opacity-60">10:00</span>
                </div>
            </div>
            <div class="pl-2">
                <p class="text-[8px] text-orange-400 font-bold mb-1 uppercase tracking-widest">Return • CX784</p>
                <div class="flex justify-between items-center text-sm font-bold text-orange-400">
                    <span>DPS → HKG</span>
                    <span class="text-[9px] opacity-60 text-white">16:10</span>
                </div>
            </div>
        </div>
    </div>

    <div id="itinerary-container"></div>

    <button onclick="loadData()" class="fixed bottom-6 right-6 bg-black text-white p-3 rounded-full shadow-lg active:scale-90 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"/></svg>
    </button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYlNFGx7MhT_2BH7GnJK4ZJGnrH1ir6vjsOg3OfeS23zR9A_olRX0jySoCiUw1lPVVMg/exec';

        const tripDays = [
            { id: '28', label: 'Tuesday, 28 Apr' },
            { id: '29', label: 'Wednesday, 29 Apr' },
            { id: '30', label: 'Thursday, 30 Apr' },
            { id: '01', label: 'Friday, 1 May' },
            { id: '02', label: 'Saturday, 2 May' }
        ];

        function cleanTime(val) {
            if (!val) return '';
            let s = val.toString();
            if (s.includes('T')) {
                let d = new Date(val);
                return `${d.getUTCHours().toString().padStart(2,'0')}:${d.getUTCMinutes().toString().padStart(2,'0')}`;
            }
            return s.substring(0, 5);
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                render(data.slice(1));
            } catch (err) { console.error(err); }
        }

        function render(rows) {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';

            tripDays.forEach(day => {
                const daySection = document.createElement('div');
                daySection.innerHTML = `<div class="day-header"><h3 class="text-[10px] font-800 text-zinc-400 uppercase tracking-widest">${day.label}</h3></div>`;
                
                const dayPlans = rows.filter(r => {
                    const rowStr = r[0].toString();
                    return rowStr.includes(`-${day.id}`) || rowStr.startsWith(day.id) || (day.id == '01' && rowStr.includes('-05-01'));
                });

                const list = document.createElement('div');
                list.className = 'mt-2';

                dayPlans.forEach(plan => {
                    const [date, start, end, activity, category, place, note] = plan;
                    const catClean = (category || 'default').toLowerCase().trim().replace(/\s/g, '');
                    
                    list.innerHTML += `
                        <div class="glass-card p-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="tag cat-${catClean}">${category || 'Trip'}</span>
                                <span class="text-[9px] font-bold text-gray-300">
                                    ${cleanTime(start)}${end ? ` — ${cleanTime(end)}` : ''}
                                </span>
                            </div>

                            <h4 class="text-md font-bold text-gray-900 leading-tight">${activity}</h4>

                            ${catClean !== 'commute' ? (
                                (!place || place === "" || place.toUpperCase() === "TBC") 
                                ? `<p class="text-[9px] text-red-500 font-bold mt-1">⚠️ TBC</p>` 
                                : `<p class="text-[9px] text-blue-500 font-bold mt-1">📍 ${place}</p>`
                            ) : ''}

                            ${note ? `<p class="mt-2 pt-2 border-t border-gray-50 text-[10px] text-gray-400 italic">${note}</p>` : ''}
                        </div>
                    `;
                });

                if (dayPlans.length > 0) {
                    daySection.appendChild(list);
                    container.appendChild(daySection);
                }
            });
        }
        loadData();
    </script>
</body>
</html>
