<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali 2026 🌴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: #ffffff; 
            border-radius: 20px; 
            border: 1px solid #f0f0f0; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
            position: relative;
        }

        .day-header { 
            position: sticky; top: 0; z-index: 30; 
            background: rgba(252, 252, 252, 0.9); 
            backdrop-filter: blur(12px); 
            padding: 20px 0 10px 0;
        }

        /* Category Color Accents */
        .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        
        .cat-meals { background: #ff4d4d; color: #fff; }
        .accent-meals { background: linear-gradient(90deg, #ff4d4d, #ff9f9f); }
        
        .cat-activity { background: #10b981; color: #fff; }
        .accent-activity { background: linear-gradient(90deg, #10b981, #6ee7b7); }
        
        .cat-freetime { background: #8b5cf6; color: #fff; }
        .accent-freetime { background: linear-gradient(90deg, #8b5cf6, #c4b5fd); }
        
        .cat-commute { background: #f59e0b; color: #fff; }
        .accent-commute { background: linear-gradient(90deg, #f59e0b, #fcd34d); }

        .cat-default { background: #6b7280; color: #fff; }
        .accent-default { background: #e5e7eb; }

        .tag { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="mb-8">
        <h1 class="text-4xl font-800 tracking-tighter text-black">Bali 2026</h1>
        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em] mt-1">Adventure Awaits</p>
    </header>

    <section class="mb-6">
        <div class="glass-card bg-slate-900 text-white p-5">
            <div class="flex justify-between items-center mb-4">
                <div class="bg-blue-500 text-[9px] font-bold px-2 py-1 rounded">CATHAY PACIFIC</div>
                <div class="text-[10px] opacity-60 font-bold uppercase">Round Trip</div>
            </div>
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-2xl font-bold leading-none">HKG</p>
                    <p class="text-[10px] opacity-50 mt-1">10:00 AM</p>
                </div>
                <div class="flex-1 px-4 flex flex-col items-center">
                    <div class="w-full border-t border-dashed border-white/20 relative">
                        <div class="absolute -top-1.5 left-1/2 -translate-x-1/2 bg-slate-900 px-2 text-blue-400">✈</div>
                    </div>
                    <p class="text-[9px] mt-2 font-bold opacity-40">CX785</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold leading-none">DPS</p>
                    <p class="text-[10px] opacity-50 mt-1">03:00 PM</p>
                </div>
            </div>
            <div class="mt-6 pt-5 border-t border-white/10 flex justify-between items-center">
                <div>
                    <p class="text-2xl font-bold leading-none text-orange-400">DPS</p>
                    <p class="text-[10px] opacity-50 mt-1">04:10 PM</p>
                </div>
                <div class="flex-1 px-4 flex flex-col items-center">
                    <div class="w-full border-t border-dashed border-white/20 relative">
                        <div class="absolute -top-1.5 left-1/2 -translate-x-1/2 bg-slate-900 px-2 text-orange-400">✈</div>
                    </div>
                    <p class="text-[9px] mt-2 font-bold opacity-40">CX784</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold leading-none text-orange-400">HKG</p>
                    <p class="text-[10px] opacity-50 mt-1">09:00 PM</p>
                </div>
            </div>
        </div>
    </section>

    <div id="itinerary-container"></div>

    <button onclick="loadData()" class="fixed bottom-8 right-8 bg-black text-white p-4 rounded-2xl shadow-2xl active:scale-95 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"/></svg>
    </button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYlNFGx7MhT_2BH7GnJK4ZJGnrH1ir6vjsOg3OfeS23zR9A_olRX0jySoCiUw1lPVVMg/exec';

        const tripDays = [
            { id: '2026-04-28', label: 'Tuesday, 28 Apr' },
            { id: '2026-04-29', label: 'Wednesday, 29 Apr' },
            { id: '2026-04-30', label: 'Thursday, 30 Apr' },
            { id: '2026-05-01', label: 'Friday, 1 May' },
            { id: '2026-05-02', label: 'Saturday, 2 May' }
        ];

        function formatTime(timeStr) {
            if (!timeStr) return '';
            const s = timeStr.toString();
            if (s.includes('T')) {
                return s.split('T')[1].substring(0, 5);
            }
            return s;
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                render(data.slice(1));
            } catch (err) {
                document.getElementById('itinerary-container').innerHTML = "Check your internet connection...";
            }
        }

        function render(rows) {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';

            tripDays.forEach(day => {
                const daySection = document.createElement('div');
                daySection.innerHTML = `<div class="day-header"><h3 class="text-xs font-800 text-black uppercase tracking-[0.2em]">${day.label}</h3></div>`;
                
                const dayPlans = rows.filter(r => r[0].toString().split('T')[0] === day.id);

                const list = document.createElement('div');
                list.className = 'mt-4 space-y-4';

                dayPlans.forEach(plan => {
                    const [date, start, end, activity, category, place, note] = plan;
                    
                    const startTime = formatTime(start);
                    const endTime = formatTime(end);
                    const catClean = (category || 'default').toLowerCase().replace(/\s/g, '');
                    const isCommute = catClean === 'commute';
                    
                    let placeDisplay = "";
                    if (!isCommute) {
                        if (!place || place === "" || place.toUpperCase() === "TBC") {
                            placeDisplay = `<p class="text-[10px] text-red-500 font-bold mt-2 flex items-center gap-1 bg-red-50 px-2 py-1 rounded w-fit">⚠️ TBC</p>`;
                        } else {
                            placeDisplay = `<p class="text-[10px] text-blue-600 font-bold mt-2 flex items-center gap-1">📍 ${place}</p>`;
                        }
                    }

                    list.innerHTML += `
                        <div class="glass-card p-5 pt-7">
                            <div class="card-accent accent-${catClean}"></div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="tag cat-${catClean}">${category || 'Activity'}</span>
                                <span class="text-[10px] font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded">
                                    ${startTime}${endTime ? ` — ${endTime}` : ''}
                                </span>
                            </div>
                            <h4 class="text-lg font-bold text-gray-900 tracking-tight leading-tight">${activity}</h4>
                            ${placeDisplay}
                            ${note ? `<p class="text-xs text-gray-500 mt-4 leading-relaxed border-l-2 border-gray-100 pl-3 italic">${note}</p>` : ''}
                        </div>
                    `;
                });

                if (dayPlans.length > 0) {
                    daySection.appendChild(list);
                    container.appendChild(daySection);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
