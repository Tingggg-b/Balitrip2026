<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali 2026 Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: #ffffff; 
            border-radius: 20px; 
            border: 1px solid #eee; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .day-header { 
            position: sticky; top: 0; z-index: 50; 
            background: rgba(250, 250, 250, 0.95); 
            backdrop-filter: blur(12px); 
            padding: 18px 0 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        /* VIVID COLORS FOR CATEGORIES */
        .tag { font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        
        .cat-meals { background: #ffeded; color: #e11d48; border: 1px solid #fecaca; }
        .cat-activity { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
        .cat-freetime { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
        .cat-commute { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .cat-default { background: #f4f4f5; color: #52525b; border: 1px solid #e4e4e7; }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="mb-8">
        <h1 class="text-4xl font-800 tracking-tighter">Bali 2026</h1>
        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mt-1">Confirmed Itinerary</p>
    </header>

    <section class="mb-10">
        <div class="glass-card p-5 border-l-8 border-blue-500">
            <div class="flex justify-between items-center text-[10px] font-bold uppercase opacity-40 mb-3 tracking-widest">
                <span>Cathay Pacific • CX785</span>
                <span>Departing HKG</span>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-2xl font-bold text-blue-600 leading-none">HKG → DPS</p>
                    <p class="text-[10px] font-bold mt-2 opacity-60">10:00 AM — 03:00 PM</p>
                </div>
                <div class="text-[24px]">✈️</div>
            </div>
        </div>

        <div class="glass-card p-5 border-l-8 border-orange-500">
            <div class="flex justify-between items-center text-[10px] font-bold uppercase opacity-40 mb-3 tracking-widest">
                <span>Cathay Pacific • CX784</span>
                <span>Departing DPS</span>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-2xl font-bold text-orange-600 leading-none">DPS → HKG</p>
                    <p class="text-[10px] font-bold mt-2 opacity-60">04:10 PM — 09:00 PM</p>
                </div>
                <div class="text-[24px]">🛫</div>
            </div>
        </div>
    </section>

    <div id="itinerary-container"></div>

    <button onclick="loadData()" class="fixed bottom-8 right-8 bg-black text-white p-4 rounded-full shadow-2xl active:scale-90 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"/></svg>
    </button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYlNFGx7MhT_2BH7GnJK4ZJGnrH1ir6vjsOg3OfeS23zR9A_olRX0jySoCiUw1lPVVMg/exec';

        const tripDays = [
            { id: '28', label: 'Tuesday, 28 Apr' },
            { id: '29', label: 'Wednesday, 29 Apr' },
            { id: '30', label: 'Thursday, 30 Apr' },
            { id: '01', label: 'Friday, 1 May' },
            { id: '02', label: 'Saturday, 2 May' }
        ];

        function cleanTime(val) {
            if (!val) return '';
            let s = val.toString();
            if (s.includes('T')) {
                // Fix the 1899 timezone shift by using UTC
                let dateObj = new Date(val);
                let hh = dateObj.getUTCHours().toString().padStart(2, '0');
                let mm = dateObj.getUTCMinutes().toString().padStart(2, '0');
                return `${hh}:${mm}`;
            }
            return s.substring(0, 5);
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                render(data.slice(1));
            } catch (err) {
                console.error(err);
            }
        }

        function render(rows) {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';

            tripDays.forEach(day => {
                const daySection = document.createElement('div');
                daySection.innerHTML = `<div class="day-header"><h3 class="text-xs font-800 text-black uppercase tracking-[0.2em]">${day.label}</h3></div>`;
                
                // Aggressive Date Filtering
                const dayPlans = rows.filter(r => {
                    const rowDateStr = r[0].toString();
                    return rowDateStr.includes(`-${day.id}`) || rowDateStr.startsWith(day.id) || (day.id == '01' && rowDateStr.includes('-05-01'));
                });

                const list = document.createElement('div');
                list.className = 'mt-4';

                dayPlans.forEach(plan => {
                    const [date, start, end, activity, category, place, note] = plan;
                    
                    const catClean = (category || 'default').toLowerCase().trim().replace(/\s/g, '');
                    const isCommute = catClean === 'commute';
                    
                    list.innerHTML += `
                        <div class="glass-card p-6">
                            <div class="flex justify-between items-center mb-4">
                                <span class="tag cat-${catClean}">${category || 'Activity'}</span>
                                <span class="text-[10px] font-bold text-gray-300">
                                    ${cleanTime(start)}${end ? ` — ${cleanTime(end)}` : ''}
                                </span>
                            </div>

                            <h4 class="text-xl font-bold text-gray-900 leading-tight mb-2">${activity}</h4>

                            ${!isCommute ? (
                                (!place || place === "" || place.toUpperCase() === "TBC") 
                                ? `<p class="text-[10px] text-red-500 font-bold flex items-center gap-1">⚠️ TBC</p>` 
                                : `<p class="text-[10px] text-blue-600 font-bold flex items-center gap-1">📍 ${place}</p>`
                            ) : ''}

                            ${note ? `
                                <div class="mt-4 pt-4 border-t border-gray-50">
                                    <p class="text-xs text-gray-400 italic leading-relaxed">${note}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });

                if (dayPlans.length > 0) {
                    daySection.appendChild(list);
                    container.appendChild(daySection);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
