<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; color: #1a1a1a; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass-card { background: #ffffff; border-radius: 12px; border: 1px solid #f0f0f0; }
        .day-header { position: sticky; top: 0; z-index: 10; background: rgba(252, 252, 252, 0.9); backdrop-filter: blur(8px); padding: 12px 0; border-bottom: 1px solid #f0f0f0; margin-top: 24px; }
        
        /* Condensed Category Tags */
        .tag { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .cat-meals { background: #fee2e2; color: #991b1b; }
        .cat-activity { background: #dcfce7; color: #166534; }
        .cat-freetime { background: #f3e8ff; color: #6b21a8; }
        .cat-commute { background: #fef9c3; color: #854d0e; }
        .cat-none { background: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body class="p-5 pb-24">

    <header class="mb-6">
        <h1 class="text-3xl font-bold tracking-tight">Bali Trip</h1>
        <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest">Shared Itinerary</p>
    </header>

    <section class="mb-4">
        <div class="glass-card p-4 space-y-3">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Departure • CX785</p>
                    <p class="text-sm font-semibold">HKG → DPS</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-gray-400">10:00 AM – 03:00 PM</p>
                </div>
            </div>
            <div class="border-t border-gray-50 pt-3 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Return • CX784</p>
                    <p class="text-sm font-semibold">DPS → HKG</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-gray-400">04:10 PM – 09:00 PM</p>
                </div>
            </div>
        </div>
    </section>

    <div id="itinerary-container">
        <div class="animate-pulse space-y-4 mt-10">
            <div class="h-4 bg-gray-100 rounded w-1/4"></div>
            <div class="h-20 bg-gray-50 rounded"></div>
        </div>
    </div>

    <button onclick="loadData()" class="fixed bottom-6 right-6 bg-black text-white p-4 rounded-full shadow-xl active:scale-90 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"/></svg>
    </button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYlNFGx7MhT_2BH7GnJK4ZJGnrH1ir6vjsOg3OfeS23zR9A_olRX0jySoCiUw1lPVVMg/exec';

        const tripDays = [
            { date: '2026-04-28', label: 'Tue, 28 Apr' },
            { date: '2026-04-29', label: 'Wed, 29 Apr' },
            { date: '2026-04-30', label: 'Thu, 30 Apr' },
            { date: '2026-05-01', label: 'Fri, 1 May' },
            { date: '2026-05-02', label: 'Sat, 2 May' }
        ];

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                render(data.slice(1));
            } catch (err) {
                console.error(err);
                document.getElementById('itinerary-container').innerHTML = "<p class='text-xs opacity-40 text-center mt-10'>Error syncing data...</p>";
            }
        }

        function render(rows) {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';

            tripDays.forEach(day => {
                const daySection = document.createElement('div');
                daySection.innerHTML = `<div class="day-header"><h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">${day.label}</h3></div>`;
                
                // FIXED: Better date matching to prevent "off by one day" errors
                const dayPlans = rows.filter(r => {
                    const rowDateRaw = r[0].toString();
                    return rowDateRaw.startsWith(day.date);
                });

                const list = document.createElement('div');
                list.className = 'mt-2 space-y-2';

                dayPlans.forEach(plan => {
                    const [date, start, end, activity, category, place, note] = plan;
                    
                    // Cleanup category for CSS class
                    const catKey = (category || 'none').toLowerCase().replace(/\s/g, '');
                    const hasPlace = place && place !== 'TBC' && place !== '';

                    list.innerHTML += `
                        <div class="glass-card p-3 flex gap-4 items-start">
                            <div class="w-16 flex-shrink-0 pt-0.5">
                                <div class="text-[10px] font-bold text-gray-900">${start || ''}</div>
                                <div class="text-[9px] font-medium text-gray-300 uppercase">${end || ''}</div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="tag cat-${catKey}">${category || 'Trip'}</span>
                                </div>
                                <h4 class="text-sm font-semibold text-gray-900 truncate">${activity}</h4>
                                ${hasPlace ? `<p class="text-[10px] text-blue-500 font-medium mt-0.5">📍 ${place}</p>` : ''}
                                ${note ? `<p class="text-[10px] text-gray-400 mt-1 italic border-l-2 border-gray-100 pl-2">${note}</p>` : ''}
                            </div>
                        </div>
                    `;
                });

                if (dayPlans.length > 0) {
                    daySection.appendChild(list);
                    container.appendChild(daySection);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
